services:
  - type: web
    name: colour-palette-analysis-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://colour-palette-analysis-web.onrender.com
      - key: PYTHON_VERSION
        value: 3.12.0

  - type: web
    name: colour-palette-analysis-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://colour-palette-analysis-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
